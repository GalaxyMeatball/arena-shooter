<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Arena Shooter</title>
<style>
  body { margin:0; background:#111; color:#eee; font-family:sans-serif; overflow:hidden; }
  #lobby, #voteScreen { max-width:440px; margin:50px auto; text-align:center; }
  #lobby input { padding:8px; font-size:16px; width:200px; margin:8px; border-radius:6px; border:1px solid #444; background:#222; color:#eee; }
  #lobby button, #voteScreen button, #leaveBtn { padding:8px 16px; font-size:15px; border-radius:6px; border:none; background:#e0552b; color:#fff; cursor:pointer; }
  .swatch { width:28px; height:28px; border-radius:50%; display:inline-block; margin:4px; cursor:pointer; border:2px solid transparent; }
  .swatch.sel { border-color:#fff; }
  .skinBtn { padding:8px 12px; margin:4px; border-radius:6px; border:1px solid #444; background:#222; color:#eee; cursor:pointer; }
  .skinBtn.sel { background:#e0552b; border-color:#e0552b; }
  #hud { position:fixed; top:10px; left:10px; font-size:13px; z-index:5; background:rgba(0,0,0,.4); padding:6px 10px; border-radius:6px;}
  #canvasWrap { display:none; }
  canvas { display:block; background:#1a1a1a; margin:0 auto; }
  .hp { position:fixed; top:10px; right:10px; font-size:16px; z-index:5;}
  #leaveBtn { position:fixed; bottom:10px; right:10px; z-index:5; }
  .mapCard { display:inline-block; width:120px; margin:8px; padding:10px; border:2px solid #444; border-radius:8px; cursor:pointer; background:#1c1c1c; }
  .mapCard.sel { border-color:#e0552b; }
  .mapCard .votes { font-size:12px; color:#aaa; margin-top:6px; }
  #devBtn { position:fixed; bottom:10px; left:10px; z-index:5; opacity:.15; font-size:11px; background:none; border:1px solid #444; color:#666; padding:3px 6px; border-radius:4px; cursor:pointer; }
  #devBtn:hover { opacity:.6; }
  #devPanel { position:fixed; bottom:40px; left:10px; z-index:7; background:#181818; border:1px solid #e0552b; border-radius:8px; padding:10px; display:none; width:220px; }
  #devPanel h4 { margin:2px 0 8px; color:#e0552b; font-size:13px; }
  #devPanel button { display:block; width:100%; margin:3px 0; padding:6px; font-size:12px; background:#222; border:1px solid #444; color:#eee; border-radius:5px; cursor:pointer; }
  #devPanel button.on { background:#e0552b; border-color:#e0552b; }
  #trollFlash { position:fixed; top:0; left:0; width:100%; height:100%; z-index:8; display:none; align-items:center; justify-content:center; font-size:36px; color:#fff; background:rgba(200,0,0,.35); pointer-events:none; }
</style>
</head>
<body>

<div id="lobby">
  <h2>Arena Shooter</h2>
  <p>Enter a room code. Share the same code with your friend to play together.</p>
  <input id="roomInput" placeholder="room code e.g. blue42" value="blue42">
  <br>
  <input id="nameInput" placeholder="your name" value="Player">
  <br>
  <p>Pick a color</p>
  <div id="colorPicker"></div>
  <p>Pick a skin</p>
  <div id="skinPicker"></div>
  <br>
  <button id="joinBtn">Join</button>
</div>

<div id="voteScreen" style="display:none">
  <h2>Vote for a map</h2>
  <div id="mapCards"></div>
  <p id="voteStatus" style="color:#aaa; font-size:13px;"></p>
</div>

<div id="canvasWrap">
  <div id="hud">Room: <span id="roomLabel"></span> | Map: <span id="mapLabel"></span> | WASD move, mouse aim, click to shoot</div>
  <div class="hp" id="hpLabel"></div>
  <button id="leaveBtn">Leave game</button>
  <div id="respawnOverlay"></div>
  <canvas id="game" width="900" height="600"></canvas>
  <div id="devPanel">
    <h4>Developer mode</h4>
    <button id="cheatGod">God mode</button>
    <button id="cheatSpeed">Speed boost</button>
    <button id="cheatGiant">Giant size</button>
    <button id="cheatTeleport">Teleport to mouse (click map)</button>
    <hr style="border-color:#333">
    <button id="trollFreeze">Freeze other player</button>
    <button id="trollShrink">Shrink other player</button>
    <button id="trollFlip">Flip their controls</button>
    <button id="trollMsg">Send troll message</button>
  </div>
  <div id="trollFlash"></div>
</div>

<script>
const FIREBASE_URL = "https://arenashooter-31663-default-rtdb.europe-west1.firebasedatabase.app";

let room, myId, myName, myColor, mySkin;
let players = {};
let bullets = [];
let keys = {};
let mouse = {x:450,y:300};
let alive = true;
let respawnAt = 0;
let invulnUntil = 0;
let pushTimer, pullTimer;
let currentMap = null;

const COLORS = ['#e0552b','#4aa8ff','#4caf50','#e0d02b','#c04ae0','#ff6fa5','#2be0c8','#ffffff'];
const SKINS = [
  {id:'circle', label:'Circle'},
  {id:'square', label:'Square'},
  {id:'triangle', label:'Triangle'},
  {id:'star', label:'Star'}
];

const MAPS = {
  open: { name:'Open Arena', obstacles: [], spawns:[[80,80],[820,80],[80,520],[820,520],[450,300]] },
  maze: { name:'Maze', obstacles: [
      {x:200,y:0,w:20,h:400},{x:400,y:200,w:20,h:400},{x:600,y:0,w:20,h:400},{x:0,y:450,w:300,h:20},{x:600,y:450,w:300,h:20}
    ], spawns:[[50,50],[850,550],[50,550],[850,50],[450,30]] },
  pillars: { name:'Pillars', obstacles: [
      {x:200,y:150,w:60,h:60},{x:640,y:150,w:60,h:60},{x:200,y:390,w:60,h:60},{x:640,y:390,w:60,h:60},{x:420,y:270,w:60,h:60}
    ], spawns:[[60,60],[840,60],[60,540],[840,540],[450,300]] }
};

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const DEV_PASSWORD = '245901';
let devUnlocked = false;
let cheats = { god:false, speed:false, giant:false };
let myEffect = null; // {type, until}

document.addEventListener('keydown', (e)=>{
  if(e.key.toLowerCase() !== 'p') return;
  if(document.getElementById('canvasWrap').style.display === 'none') return;
  if(devUnlocked){
    const panel = document.getElementById('devPanel');
    panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
    return;
  }
  const pw = prompt('Developer password:');
  if(pw === DEV_PASSWORD){
    devUnlocked = true;
    document.getElementById('devPanel').style.display = 'block';
  } else if(pw !== null){
    alert('Incorrect password.');
  }
});

document.getElementById('cheatGod').addEventListener('click', function(){
  cheats.god = !cheats.god;
  this.classList.toggle('on', cheats.god);
});
document.getElementById('cheatSpeed').addEventListener('click', function(){
  cheats.speed = !cheats.speed;
  this.classList.toggle('on', cheats.speed);
});
document.getElementById('cheatGiant').addEventListener('click', function(){
  cheats.giant = !cheats.giant;
  this.classList.toggle('on', cheats.giant);
  if(players[myId]) players[myId].giant = cheats.giant;
});
document.getElementById('cheatTeleport').addEventListener('click', function(){
  this.classList.add('on');
  canvas.addEventListener('click', teleportOnce, { once:true });
  setTimeout(()=>this.classList.remove('on'), 3000);
});
function teleportOnce(){
  if(!players[myId]) return;
  players[myId].x = mouse.x; players[myId].y = mouse.y;
}

function otherPlayerId(){
  for(const pid in players){ if(pid !== myId) return pid; }
  return null;
}

async function sendTroll(type, extra){
  const target = otherPlayerId();
  if(!target){ alert('No other player in the room yet.'); return; }
  await fetch(`${FIREBASE_URL}/rooms/${room}/effects/${target}.json`, {
    method:'PUT', body: JSON.stringify({ type, until: Date.now()+5000, by: myName, ...extra })
  });
}
document.getElementById('trollFreeze').addEventListener('click', ()=>sendTroll('freeze'));
document.getElementById('trollShrink').addEventListener('click', ()=>sendTroll('shrink'));
document.getElementById('trollFlip').addEventListener('click', ()=>sendTroll('flip'));
document.getElementById('trollMsg').addEventListener('click', ()=>{
  const msg = prompt('Troll message to send:', 'you have been pranked') || 'you have been pranked';
  sendTroll('message', { text: msg });
});

function applyIncomingEffect(effect){
  if(!effect || Date.now() > effect.until) { myEffect = null; return; }
  myEffect = effect;
  if(effect.type === 'message'){
    const flash = document.getElementById('trollFlash');
    flash.textContent = effect.text;
    flash.style.display = 'flex';
    setTimeout(()=>{ flash.style.display = 'none'; }, 2500);
    myEffect = null;
  }
}

function buildPickers(){
  const cp = document.getElementById('colorPicker');
  COLORS.forEach((c,i)=>{
    const s = document.createElement('div');
    s.className = 'swatch' + (i===0?' sel':'');
    s.style.background = c;
    s.onclick = ()=>{ myColor = c; [...cp.children].forEach(x=>x.classList.remove('sel')); s.classList.add('sel'); };
    cp.appendChild(s);
  });
  myColor = COLORS[0];

  const sp = document.getElementById('skinPicker');
  SKINS.forEach((sk,i)=>{
    const b = document.createElement('button');
    b.className = 'skinBtn' + (i===0?' sel':'');
    b.textContent = sk.label;
    b.onclick = ()=>{ mySkin = sk.id; [...sp.children].forEach(x=>x.classList.remove('sel')); b.classList.add('sel'); };
    sp.appendChild(b);
  });
  mySkin = SKINS[0].id;
}
buildPickers();

document.getElementById('joinBtn').addEventListener('click', joinRoom);
document.getElementById('nameInput').addEventListener('keydown', e=>{ if(e.key==='Enter') joinRoom(); });
document.getElementById('leaveBtn').addEventListener('click', leaveGame);

async function joinRoom(){
  room = document.getElementById('roomInput').value.trim() || 'default';
  myName = document.getElementById('nameInput').value.trim() || 'Player';
  myId = Math.random().toString(36).slice(2,9);
  document.getElementById('lobby').style.display = 'none';
  document.getElementById('voteScreen').style.display = 'block';
  await startVoting();
}

async function startVoting(){
  const cards = document.getElementById('mapCards');
  cards.innerHTML = '';
  Object.keys(MAPS).forEach(key=>{
    const div = document.createElement('div');
    div.className = 'mapCard';
    div.id = 'mapcard_'+key;
    div.innerHTML = `<div>${MAPS[key].name}</div><div class="votes" id="votes_${key}">0 votes</div>`;
    div.onclick = ()=>castVote(key);
    cards.appendChild(div);
  });
  pollVotes();
  window._voteInterval = setInterval(pollVotes, 800);
}

async function castVote(mapKey){
  document.querySelectorAll('.mapCard').forEach(c=>c.classList.remove('sel'));
  document.getElementById('mapcard_'+mapKey).classList.add('sel');
  await fetch(`${FIREBASE_URL}/rooms/${room}/votes/${myId}.json`, { method:'PUT', body: JSON.stringify(mapKey) });
}

async function pollVotes(){
  try{
    // if a map has already been resolved by any player, adopt it and stop
    const resolvedRes = await fetch(`${FIREBASE_URL}/rooms/${room}/resolved_map.json`);
    const resolved = await resolvedRes.json();
    if(resolved && MAPS[resolved]){
      clearInterval(window._voteInterval);
      currentMap = resolved;
      enterGame();
      return;
    }

    const res = await fetch(`${FIREBASE_URL}/rooms/${room}/votes.json`);
    const data = await res.json() || {};
    const counts = {open:0, maze:0, pillars:0};
    let total = 0;
    for(const pid in data){ if(counts[data[pid]] !== undefined){ counts[data[pid]]++; total++; } }
    Object.keys(counts).forEach(k=>{
      document.getElementById('votes_'+k).textContent = counts[k] + ' votes';
    });

    document.getElementById('voteStatus').textContent = total + ' vote(s) cast. Highest vote wins once at least 2 votes are in, or after 12s.';

    if(!window._voteStart) window._voteStart = Date.now();
    const timeUp = Date.now() - window._voteStart > 12000;
    if(total >= 2 || (timeUp && total >= 1)){
      let winner = 'open', best = -1;
      Object.keys(counts).sort().forEach(k=>{ if(counts[k] > best){ best = counts[k]; winner = k; } });
      // attempt to claim resolution atomically-ish: write only if still unset
      const check = await fetch(`${FIREBASE_URL}/rooms/${room}/resolved_map.json`);
      const already = await check.json();
      if(!already){
        await fetch(`${FIREBASE_URL}/rooms/${room}/resolved_map.json`, { method:'PUT', body: JSON.stringify(winner) });
      }
      clearInterval(window._voteInterval);
      currentMap = already && MAPS[already] ? already : winner;
      enterGame();
    }
  }catch(e){ console.error(e); }
}

function enterGame(){
  document.getElementById('voteScreen').style.display = 'none';
  document.getElementById('canvasWrap').style.display = 'block';
  document.getElementById('roomLabel').textContent = room;
  document.getElementById('mapLabel').textContent = MAPS[currentMap].name;

  respawnPlayer(true);

  window.addEventListener('keydown', e=>keys[e.key.toLowerCase()]=true);
  window.addEventListener('keyup', e=>keys[e.key.toLowerCase()]=false);
  canvas.addEventListener('mousemove', e=>{
    const r = canvas.getBoundingClientRect();
    mouse.x = e.clientX - r.left; mouse.y = e.clientY - r.top;
  });
  canvas.addEventListener('click', shoot);
  window.addEventListener('beforeunload', leaveGame);

  setInterval(gameTick, 33);
  pushTimer = setInterval(pushState, 120);
  pullTimer = setInterval(pullState, 150);
  requestAnimationFrame(render);
}

function pickSpawn(){
  const spawns = MAPS[currentMap].spawns;
  let best = spawns[0], bestDist = -1;
  for(const [sx,sy] of spawns){
    let minD = Infinity;
    for(const pid in players){
      if(pid===myId) continue;
      const p = players[pid];
      minD = Math.min(minD, Math.hypot(p.x-sx, p.y-sy));
    }
    if(minD === Infinity) minD = 9999;
    if(minD > bestDist){ bestDist = minD; best = [sx,sy]; }
  }
  return best;
}

function respawnPlayer(initial){
  const [sx,sy] = pickSpawn();
  players[myId] = {
    x: sx, y: sy, angle:0, hp:100, name:myName, color:myColor, skin:mySkin,
    ts:Date.now()
  };
  alive = true;
  invulnUntil = Date.now() + 1500;
  document.getElementById('respawnOverlay').style.display = 'none';
  if(!initial) pushState();
}

function collidesWithObstacle(x,y,r){
  for(const o of MAPS[currentMap].obstacles){
    const cx = Math.max(o.x, Math.min(x, o.x+o.w));
    const cy = Math.max(o.y, Math.min(y, o.y+o.h));
    if(Math.hypot(x-cx,y-cy) < r) return true;
  }
  return false;
}

function shoot(){
  if(!alive) return;
  const me = players[myId];
  const bid = myId+'_'+Date.now()+'_'+Math.floor(Math.random()*1000);
  const dx = mouse.x - me.x, dy = mouse.y - me.y;
  const len = Math.hypot(dx,dy)||1;
  bullets.push({id:bid, x:me.x, y:me.y, vx:dx/len*9, vy:dy/len*9, owner:myId, ts:Date.now()});
}

let respawnCountdownShown = false;
function gameTick(){
  if(!alive){
    const remain = Math.ceil((respawnAt - Date.now())/1000);
    const overlay = document.getElementById('respawnOverlay');
    overlay.style.display = 'flex';
    overlay.textContent = remain > 0 ? ('Respawning in ' + remain + '...') : 'Respawning...';
    if(Date.now() > respawnAt){
      respawnPlayer(false);
    }
    return;
  }
  const me = players[myId];
  const frozen = myEffect && myEffect.type === 'freeze' && Date.now() < myEffect.until;
  const flipped = myEffect && myEffect.type === 'flip' && Date.now() < myEffect.until;
  let speed = cheats.speed ? 8 : 4;
  let nx = me.x, ny = me.y;
  if(!frozen){
    let up = keys['w'], down = keys['s'], left = keys['a'], right = keys['d'];
    if(flipped){ [up,down] = [down,up]; [left,right] = [right,left]; }
    if(up) ny -= speed;
    if(down) ny += speed;
    if(left) nx -= speed;
    if(right) nx += speed;
  }
  nx = Math.max(15, Math.min(885, nx));
  ny = Math.max(15, Math.min(585, ny));
  if(!collidesWithObstacle(nx, me.y, 15)) me.x = nx;
  if(!collidesWithObstacle(me.x, ny, 15)) me.y = ny;
  me.angle = Math.atan2(mouse.y-me.y, mouse.x-me.x);
  me.ts = Date.now();

  bullets = bullets.filter(b=>{
    b.x += b.vx; b.y += b.vy;
    if(b.x<0||b.x>900||b.y<0||b.y>600) return false;
    if(Date.now()-b.ts > 2000) return false;
    if(collidesWithObstacle(b.x,b.y,4)) return false;
    if(b.owner !== myId){
      const invuln = Date.now() < invulnUntil || cheats.god;
      if(!invuln && Math.hypot(me.x-b.x, me.y-b.y) < 16 && alive){
        me.hp -= 15;
        if(me.hp <= 0){
          alive = false;
          respawnAt = Date.now() + 3000;
          me.hp = 0;
        }
        return false;
      }
    }
    return true;
  });

  const invuln = Date.now() < invulnUntil;
  document.getElementById('hpLabel').textContent = 'HP: ' + me.hp + (invuln ? ' (shielded)' : '');
}

async function pushState(){
  try{
    const me = players[myId];
    if(!me) return;
    await fetch(`${FIREBASE_URL}/rooms/${room}/players/${myId}.json`, { method:'PUT', body: JSON.stringify(me) });
    const myBullets = bullets.filter(b=>b.owner===myId);
    await fetch(`${FIREBASE_URL}/rooms/${room}/bullets/${myId}.json`, { method:'PUT', body: JSON.stringify(myBullets) });
  }catch(e){ console.error('push failed', e); }
}

async function pullState(){
  try{
    const res = await fetch(`${FIREBASE_URL}/rooms/${room}/players.json`);
    const data = await res.json();
    if(data){
      for(const pid in data){
        if(pid === myId) continue;
        const p = data[pid];
        if(p && Date.now() - p.ts < 8000){
          players[pid] = p;
        } else {
          delete players[pid];
        }
      }
      for(const pid in players){
        if(pid !== myId && !data[pid]) delete players[pid];
      }
    }

    const effRes = await fetch(`${FIREBASE_URL}/rooms/${room}/effects/${myId}.json`);
    const eff = await effRes.json();
    if(eff) applyIncomingEffect(eff);
    else myEffect = null;
    const bres = await fetch(`${FIREBASE_URL}/rooms/${room}/bullets.json`);
    const bdata = await bres.json();
    if(bdata){
      for(const pid in bdata){
        if(pid === myId) continue;
        const arr = bdata[pid];
        if(!arr) continue;
        for(const nb of arr){
          if(!bullets.find(b=>b.id===nb.id) && Date.now()-nb.ts < 2000){
            bullets.push(nb);
          }
        }
      }
    }
  }catch(e){ console.error('pull failed', e); }
}

async function leaveGame(){
  try{
    clearInterval(pushTimer); clearInterval(pullTimer);
    await fetch(`${FIREBASE_URL}/rooms/${room}/players/${myId}.json`, { method:'DELETE' });
    await fetch(`${FIREBASE_URL}/rooms/${room}/bullets/${myId}.json`, { method:'DELETE' });
    await fetch(`${FIREBASE_URL}/rooms/${room}/votes/${myId}.json`, { method:'DELETE' });
  }catch(e){}
  location.reload();
}

function drawSkin(skin, size){
  ctx.beginPath();
  if(skin === 'square'){
    ctx.rect(-size,-size,size*2,size*2);
  } else if(skin === 'triangle'){
    ctx.moveTo(size*1.2,0); ctx.lineTo(-size,-size); ctx.lineTo(-size,size); ctx.closePath();
  } else if(skin === 'star'){
    for(let i=0;i<10;i++){
      const r = i%2===0 ? size*1.1 : size*0.5;
      const a = Math.PI*2*i/10;
      const px = Math.cos(a)*r, py = Math.sin(a)*r;
      if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
    }
    ctx.closePath();
  } else {
    ctx.arc(0,0,size,0,Math.PI*2);
  }
  ctx.fill();
}

function render(){
  ctx.clearRect(0,0,900,600);
  ctx.strokeStyle = '#333';
  for(let x=0;x<900;x+=50){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,600); ctx.stroke(); }
  for(let y=0;y<600;y+=50){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(900,y); ctx.stroke(); }

  if(currentMap){
    ctx.fillStyle = '#3a3a3a';
    for(const o of MAPS[currentMap].obstacles){
      ctx.fillRect(o.x,o.y,o.w,o.h);
    }
  }

  for(const b of bullets){
    ctx.fillStyle = '#ffd23f';
    ctx.beginPath(); ctx.arc(b.x,b.y,4,0,Math.PI*2); ctx.fill();
  }

  for(const pid in players){
    const p = players[pid];
    if(pid!==myId && Date.now()-p.ts>8000) continue;
    const isShielded = pid===myId && (Date.now() < invulnUntil || cheats.god);
    let size = 15;
    if(pid===myId && cheats.giant) size = 30;
    if(pid===myId && myEffect && myEffect.type==='shrink' && Date.now() < myEffect.until) size = 7;
    ctx.save();
    ctx.translate(p.x,p.y);
    if(isShielded){
      ctx.globalAlpha = 0.5 + 0.5*Math.sin(Date.now()/100);
    }
    ctx.rotate(p.angle||0);
    ctx.fillStyle = p.color || '#4aa8ff';
    drawSkin(p.skin || 'circle', size);
    ctx.fillStyle = '#fff';
    ctx.fillRect(size-5,-3,14,6);
    ctx.restore();

    ctx.fillStyle = '#fff';
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(p.name||'?', p.x, p.y-24);

    ctx.fillStyle = '#500';
    ctx.fillRect(p.x-20, p.y-20, 40, 5);
    ctx.fillStyle = '#4caf50';
    ctx.fillRect(p.x-20, p.y-20, 40*Math.max(0,(p.hp??100))/100, 5);
  }

  requestAnimationFrame(render);
}
</script>
</body>
</html>
